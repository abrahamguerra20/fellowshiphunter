<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Map | Fellowship Hunter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{--navy:#233B52;--steel:#325879;--gold:#E5A818;--cream:#F0EBE3;--white:#fff;--dark:#141E27;--muted:#5A7080;--border:rgba(35,59,82,0.1);--font-h:'Lora',serif;--font-b:'Work Sans',sans-serif;--t:0.22s}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font-b);background:var(--dark);color:var(--navy);-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}

/* HEADER */
header{position:sticky;top:0;z-index:1000;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:68px;max-width:1160px;margin:0 auto;padding:0 24px;gap:20px}
.logo{font-family:var(--font-h);font-weight:700;font-size:1.2rem;color:var(--navy);display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;background:var(--navy);border-radius:6px;display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:16px;height:16px}
nav.main-nav{display:flex;gap:2px}
nav.main-nav a{font-size:.85rem;font-weight:500;color:var(--steel);padding:6px 12px;border-radius:4px;transition:color var(--t),background var(--t)}
nav.main-nav a:hover{color:var(--navy);background:var(--cream)}
nav.main-nav a.active{font-weight:700;color:var(--gold);background:var(--cream)}
.lang-toggle{display:flex;gap:2px;border:1px solid var(--border);border-radius:6px;padding:3px;background:var(--cream)}
.lang-btn{background:none;border:none;font-family:var(--font-b);font-size:.76rem;font-weight:700;color:var(--muted);cursor:pointer;padding:4px 9px;border-radius:4px;transition:all var(--t)}
.lang-btn.active{background:var(--navy);color:#fff}

/* MAP LAYOUT */
.map-layout{display:flex;height:calc(100vh - 68px)}

/* SIDEBAR */
.sidebar{width:360px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;z-index:500}
.sidebar-header{padding:20px 20px 14px;border-bottom:1px solid var(--border);background:var(--navy)}
.sidebar-title{font-family:var(--font-h);font-size:1.1rem;color:#fff;margin-bottom:6px}
.sidebar-sub{font-size:.78rem;color:rgba(255,255,255,.45)}
.sidebar-search{padding:14px 16px;border-bottom:1px solid var(--border);position:relative}
.sidebar-search input{width:100%;padding:9px 14px 9px 36px;border:1.5px solid var(--border);border-radius:8px;font-family:var(--font-b);font-size:.84rem;color:var(--navy);background:var(--cream);outline:none;transition:border-color var(--t)}
.sidebar-search input:focus{border-color:var(--gold);background:#fff}
.sidebar-search::before{content:'🔍';position:absolute;left:28px;top:50%;transform:translateY(-50%);font-size:.8rem;pointer-events:none}
.sidebar-filters{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap}
.filter-chip{padding:5px 12px;border-radius:50px;border:1.5px solid var(--border);font-size:.72rem;font-weight:700;cursor:pointer;transition:all var(--t);background:var(--white);color:var(--muted);font-family:var(--font-b)}
.filter-chip.active{border-color:var(--gold);background:rgba(229,168,24,.12);color:var(--navy)}
.sidebar-count{padding:8px 16px;font-size:.75rem;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border)}
.sidebar-list{overflow-y:auto;flex:1}
.sidebar-item{padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background var(--t)}
.sidebar-item:hover{background:var(--cream)}
.sidebar-item.selected{background:rgba(229,168,24,.08);border-left:3px solid var(--gold)}
.sidebar-item-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
.sidebar-item-name{font-size:.88rem;font-weight:600;color:var(--navy);line-height:1.3;font-family:var(--font-h)}
.sidebar-item-flag{font-size:1.1rem;flex-shrink:0}
.sidebar-item-org{font-size:.72rem;color:var(--muted);margin-bottom:6px}
.sidebar-item-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.tag-xs{display:inline-flex;padding:2px 8px;border-radius:50px;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.tag-phd-xs{background:rgba(35,59,82,.1);color:var(--navy)}
.tag-masters-xs{background:rgba(50,88,121,.12);color:var(--steel)}
.tag-postdoc-xs{background:rgba(229,168,24,.15);color:#8a6000}
.tag-other-xs{background:rgba(100,100,200,.1);color:#5050a0}
.sidebar-item-deadline{font-size:.7rem;color:var(--muted);margin-left:auto}

/* MAP */
#map{flex:1;z-index:100}

/* DETAIL PANEL */
.detail-panel{position:absolute;bottom:24px;right:24px;width:340px;background:#fff;border-radius:12px;box-shadow:0 8px 32px rgba(20,30,39,.25);z-index:600;overflow:hidden;transform:translateY(20px);opacity:0;pointer-events:none;transition:all .25s}
.detail-panel.open{transform:none;opacity:1;pointer-events:all}
.detail-header{background:var(--navy);padding:18px 20px}
.detail-close{float:right;background:rgba(255,255,255,.12);border:none;color:#fff;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:background var(--t)}
.detail-close:hover{background:rgba(255,255,255,.22)}
.detail-flag{font-size:1.4rem;margin-bottom:6px}
.detail-name{font-family:var(--font-h);font-size:.95rem;color:#fff;line-height:1.3;margin-bottom:4px}
.detail-org{font-size:.72rem;color:rgba(255,255,255,.45)}
.detail-body{padding:16px 20px}
.detail-row{display:flex;gap:8px;margin-bottom:8px;font-size:.82rem}
.detail-key{font-weight:700;color:var(--navy);min-width:72px;font-size:.74rem;text-transform:uppercase;letter-spacing:.3px;padding-top:1px;flex-shrink:0}
.detail-val{color:var(--muted);line-height:1.5}
.detail-foot{padding:0 20px 18px;display:flex;gap:8px}
.btn-detail{display:inline-flex;align-items:center;justify-content:center;padding:9px 16px;border-radius:6px;font-size:.8rem;font-weight:600;font-family:var(--font-b);border:1.5px solid transparent;cursor:pointer;transition:all var(--t);text-decoration:none;flex:1}
.btn-detail-gold{background:var(--gold);color:var(--navy);border-color:var(--gold)}
.btn-detail-gold:hover{background:transparent;color:var(--gold)}
.btn-detail-ghost{background:transparent;color:var(--steel);border-color:var(--border)}
.btn-detail-ghost:hover{border-color:var(--navy);color:var(--navy)}

/* LEGEND */
.map-legend{position:absolute;top:84px;right:16px;background:rgba(255,255,255,.96);border-radius:10px;padding:14px 16px;z-index:600;box-shadow:0 4px 16px rgba(20,30,39,.12);border:1px solid var(--border)}
.legend-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px;font-family:var(--font-b)}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:.75rem;color:var(--navy);font-weight:500}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* RESPONSIVE */
@media(max-width:860px){
  .sidebar{width:280px}
  .detail-panel{right:12px;bottom:12px;width:300px}
}
@media(max-width:640px){
  nav.main-nav{display:none}
  .map-layout{flex-direction:column}
  .sidebar{width:100%;height:280px;border-right:none;border-bottom:1px solid var(--border)}
  #map{flex:1;min-height:200px}
  .detail-panel{width:calc(100% - 24px);right:12px}
}
</style>
</head>

  const l = level.toLowerCase();
  if(l.includes('phd')||l.includes('doctoral')) return LEVEL_COLORS.phd;

// ══ INIT MAP ══
const map = L.map('map', {zoomControl:false}).setView([25, 15], 2);
L.control.zoom({position:'topright'}).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution:'&copy; OpenStreetMap &copy; CARTO',
  maxZoom:18
}).addTo(map);

// Group calls by country
const byCountry = {};
CALLS.forEach(c => {
  if(!byCountry[c.country]) byCountry[c.country] = [];
  byCountry[c.country].push(c);
});

// Create markers
const markers = {};
Object.entries(byCountry).forEach(([country, calls]) => {
  const coords = COORDS[country];
  if(!coords) return;

  const [lat, lng] = Array.isArray(coords[0]) ? coords[0] : coords;
  const primaryLevel = calls[0].level;
  const color = getLevelColor(primaryLevel);
  const count = calls.length;

  const icon = L.divIcon({
    html: `<div style="
      background:${color};
      width:${count > 2 ? 36 : 28}px;
      height:${count > 2 ? 36 : 28}px;
      border-radius:50%;
      border:3px solid rgba(255,255,255,.9);
      display:flex;align-items:center;justify-content:center;
      font-size:${count > 1 ? '.72rem' : '.6rem'};
      font-weight:700;color:#fff;
      box-shadow:0 2px 8px rgba(0,0,0,.35);
      font-family:'Work Sans',sans-serif;
    ">${count > 1 ? count : ''}</div>`,
    className:'',
    iconSize:[count > 2 ? 36 : 28, count > 2 ? 36 : 28],
    iconAnchor:[count > 2 ? 18 : 14, count > 2 ? 18 : 14]
  });

  const marker = L.marker([lat, lng], {icon}).addTo(map);
  markers[country] = marker;

  marker.on('click', () => {
    if(calls.length === 1) {
      showDetail(calls[0]);
    } else {
      showDetail(calls[0]);
      highlightSidebarCountry(country);
    }
    map.setView([lat, lng], Math.max(map.getZoom(), 4), {animate:true});
  });
});

// ══ SIDEBAR ══
let levelFilter = '';
let searchFilter = '';

function renderSidebar(data) {
  const list = document.getElementById('sidebar-list');
  document.getElementById('sidebar-count').textContent = `Showing ${data.length} calls`;
  list.innerHTML = data.map((c,i) => `
    <div class="sidebar-item" id="si-${c.id}" onclick="sidebarClick('${c.id}','${c.country}')">
      <div class="sidebar-item-top">
        <div class="sidebar-item-name">${c.name}</div>
        <span class="sidebar-item-flag">${c.flag}</span>
      </div>
      <div class="sidebar-item-org">${c.org} · ${c.country}</div>
      <div class="sidebar-item-meta">
        <span class="tag-xs ${getLevelClass(c.level)}">${c.level.split('·')[0].trim()}</span>
        <span class="sidebar-item-deadline">${c.deadline}</span>
      </div>
    </div>
  `).join('');
}

function sidebarClick(id, country) {
  const call = CALLS.find(c => c.id === id);
  if(!call) return;
  showDetail(call);
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('selected'));
  const el = document.getElementById(`si-${id}`);
  if(el) { el.classList.add('selected'); el.scrollIntoView({block:'nearest'}); }
  const coords = COORDS[country];
  if(coords) {
    const [lat, lng] = Array.isArray(coords[0]) ? coords[0] : coords;
    map.setView([lat, lng], 5, {animate:true});
  }
}

function highlightSidebarCountry(country) {
  const call = CALLS.find(c => c.country === country);
  if(call) sidebarClick(call.id, country);
}

function setLevel(el, level) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  levelFilter = level;
  filterSidebar();
}

function filterSidebar() {
  searchFilter = document.getElementById('sidebar-search').value.toLowerCase();
  const filtered = CALLS.filter(c => {
    const matchSearch = !searchFilter ||
      c.name.toLowerCase().includes(searchFilter) ||
      c.country.toLowerCase().includes(searchFilter) ||
      c.org.toLowerCase().includes(searchFilter);
    const matchLevel = !levelFilter || c.level.toLowerCase().includes(levelFilter.toLowerCase());
    return matchSearch && matchLevel;
  });
  renderSidebar(filtered);
}

function getLevelColor(level) {
  const l = level.toLowerCase();
  if(l.includes('phd')||l.includes('doctoral')) return '#233B52';
  if(l.includes('master')) return '#325879';
  if(l.includes('postdoc')) return '#E5A818';
  if(l.includes('research')) return '#5a9e6f';
  return '#9b7fd4';
}

function getLevelClass(level) {
  const l = level.toLowerCase();
  if(l.includes('phd')) return 'tag-phd-xs';
  if(l.includes('master')) return 'tag-masters-xs';
  if(l.includes('postdoc')) return 'tag-postdoc-xs';
  return 'tag-other-xs';
}

// ══ DETAIL PANEL ══
function showDetail(c) {
  document.getElementById('d-flag').textContent = c.flag;
  document.getElementById('d-name').textContent = c.name;
  document.getElementById('d-org').textContent = c.org;
  document.getElementById('d-stipend').textContent = c.stipend;
  document.getElementById('d-level').textContent = c.level;
  document.getElementById('d-deadline').textContent = c.deadline;
  document.getElementById('d-fields').textContent = c.fields.length > 60 ? c.fields.substring(0,60)+'…' : c.fields;
  document.getElementById('d-link').href = c.website;
  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
}

function setLang(lang) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === lang));
}

// INIT
renderSidebar(CALLS);
document.getElementById('sidebar-sub').textContent = `${CALLS.length} funded opportunities · ${Object.keys(byCountry).length} countries`;
</script>
